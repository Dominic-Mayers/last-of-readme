<!doctype html>
<html>
<!--
    TODO: The resolver should not hang in the "Resolving..." state when
          unsupported or legacy resolver links are used.
-->
<head><meta charset="utf-8"><title>Resolver</title></head>
<body>
<p>Resolving…</p>
<script src="./remote-repository-adapter.js"></script>
<script src="./readme-resolver-core.js"></script>
<script>
function dispatchOutcome(outcome) {
  if (outcome.action === 'redirect') {
    location.href = outcome.url;
    return;
  }

  renderResolutionPage(outcome.page);
}

function renderResolutionPage(page) {
  document.body.replaceChildren();

  const message = document.createElement('p');
  message.textContent = page.message;
  document.body.appendChild(message);

  if (!page.links.length) {
    return;
  }

  const list = document.createElement('ul');

  for (const link of page.links) {
    const item = document.createElement('li');
    const anchor = document.createElement('a');
    anchor.href = link.url;
    anchor.textContent = link.label;
    item.appendChild(anchor);
    list.appendChild(item);
  }

  document.body.appendChild(list);
}

(async () => {
  const p = new URLSearchParams(location.search);
  const repositoryApiUrl = p.get('repositoryApiUrl');
  const repositoryBrowserUrl = p.get('repositoryBrowserUrl');
  const repository = p.get('repo');
  const host = p.get('host') || 'github.com';
  const version = p.get('v');
  const urlPath = p.get('urlPath') || '';
  const contract = p.get('contract') || 'until-next';

  if ((!repositoryApiUrl || !repositoryBrowserUrl) && !repository) {
    document.body.innerText = 'missing params';
    return;
  }

  if (!version) {
    document.body.innerText = 'missing params';
    return;
  }

  const remote = {
    kind: 'github',
    repositoryApiUrl,
    repositoryBrowserUrl,
  };
  const remoteRepository = createRemoteRepositoryAPI(remote);
  const repositoryPage = createRepositoryPageAPI(remote, urlPath);

  const outcome = await LastOfReadmeResolver.resolveReadmeLink({
    remoteRepository,
    repositoryPage,
    version,
    contract,
  });
  dispatchOutcome(outcome);
})();
</script>
</body>
</html>
