<!doctype html>
<html>
<!-- 
    TODO: The resolver should not hang in the "Resolving..." state when
          unsupported or legacy resolver links are used. 
-->
<head><meta charset="utf-8"><title>Resolver</title></head>
<body>
<p>Resolving…</p>
<script src="./remote-repository-adapter.js"></script>
<script>
function redirectOutcome(url) {
  return { action: 'redirect', url };
}

function renderOutcome(page) {
  return { action: 'render', page };
}

function dispatchOutcome(outcome) {
  if (outcome.action === 'redirect') {
    location.href = outcome.url;
    return;
  }

  renderResolutionPage(outcome.page);
}

function renderResolutionPage(page) {
  document.body.replaceChildren();

  const message = document.createElement('p');
  message.textContent = page.message;
  document.body.appendChild(message);

  if (!page.links.length) {
    return;
  }

  const list = document.createElement('ul');

  for (const link of page.links) {
    const item = document.createElement('li');
    const anchor = document.createElement('a');
    anchor.href = link.url;
    anchor.textContent = link.label;
    item.appendChild(anchor);
    list.appendChild(item);
  }

  document.body.appendChild(list);
}

async function resolveUntilSuccessorOfContract(remoteRepository, version) {
  const base = `v${version}`;
  const last = `${base}-last-of`;
  const next = `${base}-successor-of`;

  if (await remoteRepository.resolveTag(last)) {
    return redirectOutcome(remoteRepository.browseDocumentation(last));
  }

  if (await remoteRepository.resolveTag(next)) {
    return redirectOutcome(remoteRepository.browseDocumentation(next));
  }

  const baseRepoNode = await remoteRepository.resolveTag(base);
  if (!baseRepoNode) {
    return renderOutcome({
      kind: 'not-found',
      message: 'version tag not found',
      links: [],
    });
  }

  const containingBranches = await remoteRepository.branchesContaining(baseRepoNode);

  if (containingBranches.length === 1) {
    return redirectOutcome(remoteRepository.browseDocumentation(containingBranches[0]));
  }

  if (containingBranches.length > 1) {
    return renderOutcome({
      kind: 'ambiguous',
      message: 'multiple branches: ' + containingBranches.join(', '),
      links: containingBranches.map((branch) => ({
        label: branch,
        url: remoteRepository.browseDocumentation(branch),
      })),
    });
  }

  return redirectOutcome(remoteRepository.browseDocumentation(base));
}

async function resolveLastStyleContract(remoteRepository, version, { hasWarning }) {
  const base = `v${version}`;
  const last = `${base}-last-of`;
  const next = `${base}-successor-of`;
  const fallbackMessage =
    'No last-of tag was found. The following documentation is not marked as authoritative for this version.';

  function singleLinkOutcome({ kind = 'fallback', label, url }) {
    if (!hasWarning) {
      return redirectOutcome(url);
    }

    return renderOutcome({
      kind,
      message: fallbackMessage,
      links: [{ label, url }],
    });
  }

  if (await remoteRepository.resolveTag(last)) {
    return redirectOutcome(remoteRepository.browseDocumentation(last));
  }

  const baseRepoNode = await remoteRepository.resolveTag(base);
  if (!baseRepoNode) {
    return renderOutcome({
      kind: 'not-found',
      message: hasWarning
        ? 'No last-of tag was found, and the version tag was not found.'
        : 'version tag not found',
      links: [],
    });
  }

  const containingBranches = await remoteRepository.branchesContaining(baseRepoNode);

  if (containingBranches.length > 1) {
    return renderOutcome({
      kind: 'ambiguous',
      message: hasWarning
        ? 'No last-of tag was found, and multiple branches contain this version. The following documentation is not marked as authoritative for this version.'
        : 'multiple branches: ' + containingBranches.join(', '),
      links: containingBranches.map((branch) => ({
        label: branch,
        url: remoteRepository.browseDocumentation(branch),
      })),
    });
  }

  if (await remoteRepository.resolveTag(next)) {
    return singleLinkOutcome({
      label: next,
      url: remoteRepository.browseDocumentation(next),
    });
  }

  if (containingBranches.length === 1) {
    return singleLinkOutcome({
      label: containingBranches[0],
      url: remoteRepository.browseDocumentation(containingBranches[0]),
    });
  }

  return singleLinkOutcome({
    label: base,
    url: remoteRepository.browseDocumentation(base),
  });
}

async function resolveLastOfContract(remoteRepository, version) {
  return resolveLastStyleContract(remoteRepository, version, { hasWarning: true });
}

async function resolveContinuationOfContract(remoteRepository, version) {
  return resolveLastStyleContract(remoteRepository, version, { hasWarning: false });
}


async function resolveCorrectionOfContract(remoteRepository, version) {
  const base = `v${version}`;
  const correction = `${base}-correction-of`;

  if (await remoteRepository.resolveTag(correction)) {
    return redirectOutcome(remoteRepository.browseDocumentation(correction));
  }

  if (await remoteRepository.resolveTag(base)) {
    return redirectOutcome(remoteRepository.browseDocumentation(base));
  }

  return renderOutcome({
    kind: 'not-found',
    message: 'No correction-of tag was found, and the version tag was not found.',
    links: [],
  });
}

const contractResolvers = {
  'until-successor-of': resolveUntilSuccessorOfContract,
  'last-of': resolveLastOfContract,
  'continuation-of': resolveContinuationOfContract,
  'correction-of': resolveCorrectionOfContract,
};

(async () => {
  const p = new URLSearchParams(location.search);
  const repositoryApiUrl = p.get('repositoryApiUrl');
  const repositoryBrowserUrl = p.get('repositoryBrowserUrl');
  const repository = p.get('repo');
  const host = p.get('host') || 'github.com';
  const version = p.get('v');
  const urlPath = p.get('urlPath') || '';
  const contract = p.get('contract') || 'until-successor-of';

  if ((!repositoryApiUrl || !repositoryBrowserUrl) && !repository) {
    document.body.innerText = 'missing params';
    return;
  }

  if (!version) {
    document.body.innerText = 'missing params';
    return;
  }

  const remoteRepository = createRemoteRepositoryAPI({
    kind: 'github',
    repositoryApiUrl,
    repositoryBrowserUrl,
  }, urlPath);

  const contractResolver = contractResolvers[contract];
  if (!contractResolver) {
    dispatchOutcome(renderOutcome({
      kind: 'not-found',
      message: `unsupported documentation contract: ${contract}`,
      links: [],
    }));
    return;
  }

  const outcome = await contractResolver(remoteRepository, version);
  dispatchOutcome(outcome);
})();
</script>
</body>
</html>
