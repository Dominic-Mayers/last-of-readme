<!doctype html>
<html>
<head><meta charset="utf-8"><title>Resolver</title></head>
<body>
<p>Resolving…</p>
<script>
const params = new URLSearchParams(window.location.search);
const repo = params.get("repo");
const docTagSuffix = "-last-doc";
const nextDocTagSuffix = "-next-doc";

function gh(ref){return `https://github.com/${repo}/tree/${encodeURIComponent(ref)}`;}
function api(p){return `https://api.github.com/repos/${repo}${p}`;}

async function j(u){const r=await fetch(u,{headers:{Accept:"application/vnd.github+json"}});if(!r.ok)throw new Error(u);return r.json();}
async function exists(ref){const r=await fetch(api(`/commits/${encodeURIComponent(ref)}`));return r.ok;}
async function sha(ref){return (await j(api(`/commits/${encodeURIComponent(ref)}`))).sha;}
async function branches(){return j(api(`/branches`));}
async function cmp(a,b){return j(api(`/compare/${encodeURIComponent(a)}...${encodeURIComponent(b)}`));}

async function contains(commit){
  const bs=await branches();const out=[];
  for(const b of bs){
    const c=await cmp(commit,b.name);
    console.log("cmp",commit,b.name,c.status);
    if(c.status==="ahead"||c.status==="identical") out.push(b);
  }
  return out;
}

async function reachable(commit,branch){
  const c=await cmp(commit,branch);
  return c.status==="ahead"||c.status==="identical";
}

async function run(){
  const v=params.get("v");
  const info=await j(api(""));
  const def=info.default_branch;

  const vTag=`v${v}`;
  const last=`${vTag}${docTagSuffix}`;
  const next=`${vTag}${nextDocTagSuffix}`;

  if(await exists(last)){location.href=gh(last);return;}

  const vSha=await sha(vTag);
  const bs=await contains(vSha);

  if(bs.length===1){
    if(await exists(next)){
      const nSha=await sha(next);
      if(await reachable(nSha,bs[0].name)){location.href=gh(next);return;}
    }
    location.href=gh(bs[0].name);return;
  }

  if(bs.length>1){
    document.body.innerHTML="multiple branches";
    return;
  }

  if(await exists(next)){
    document.body.innerHTML="next-doc fallback";
    return;
  }

  location.href=gh(def);
}

run();
</script>
</body>
</html>
