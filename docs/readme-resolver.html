<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Documentation redirect</title>
  </head>
  <body>
    <p>Resolving documentation…</p>

    <script>
      const params = new URLSearchParams(window.location.search);
      const repo = params.get("repo");
      const npmPackage = params.get("pkg");
      const docTagSuffix = params.get("docTagSuffix") || "-last-doc";

      function compareVersions(a, b) {
        const pa = a.split(".").map(Number);
        const pb = b.split(".").map(Number);
        for (let i = 0; i < 3; i++) {
          if ((pa[i] || 0) !== (pb[i] || 0)) {
            return (pa[i] || 0) - (pb[i] || 0);
          }
        }
        return 0;
      }

      function githubTreeUrl(ref) {
        return `https://github.com/${repo}/tree/${encodeURIComponent(ref)}`;
      }

      function githubRawReadmeUrl(ref) {
        return `https://raw.githubusercontent.com/${repo}/${encodeURIComponent(ref)}/README.md`;
      }

      async function refExists(ref) {
        const check = await fetch(githubRawReadmeUrl(ref), { method: "HEAD" });
        return check.ok;
      }

      async function resolve() {
        const params = new URLSearchParams(window.location.search);
        const version = params.get("v");
        const mode = params.get("mode");

        if (!version || version === "__VERSION__") {
          window.location.href = githubTreeUrl("main");
          return;
        }

        const exactRef = `v${version}`;
        const docRef = `v${version}${docTagSuffix}`;

        try {
          if (mode === "last") {
            // 1. Prefer explicit doc tag.
            if (await refExists(docRef)) {
              window.location.href = githubTreeUrl(docRef);
              return;
            }

            // 2. Fall back to current npm-based behavior.
            const res = await fetch(`https://registry.npmjs.org/${npmPackage}`);
            if (!res.ok) {
              throw new Error(`npm registry responded with status ${res.status}`);
            }

            const data = await res.json();
            const versions = Object.keys(data.versions).sort(compareVersions);

            if (!versions.includes(version)) {
              document.body.innerHTML = `
                <h2>Unknown version</h2>
                <p>
                  The requested version <code>${version}</code> is not a published npm version of
                  <code>${npmPackage}</code>.
                </p>
                <ul>
                  <li><a href="${githubTreeUrl("main")}">Latest documentation</a></li>
                  <li><a href="https://www.npmjs.com/package/${encodeURIComponent(npmPackage)}">npm package page</a></li>
                </ul>
              `;
              return;
            }

            const nextVersion = versions.find(
              (v) => compareVersions(v, version) > 0
            );

            if (!nextVersion) {
              window.location.href = githubTreeUrl("main");
              return;
            }

            const nextRef = `v${nextVersion}`;

            if (await refExists(nextRef)) {
              window.location.href = githubTreeUrl(nextRef);
              return;
            }

            document.body.innerHTML = `
              <h2>Documentation discrepancy</h2>
              <p>
                No explicit documentation tag <code>${docRef}</code> was found,
                and the fallback target <code>${nextRef}</code> could not be resolved.
              </p>
              <ul>
                <li><a href="${githubTreeUrl(nextRef)}">Expected GitHub target</a></li>
                <li><a href="https://github.com/${repo}/tags">GitHub tags</a></li>
                <li><a href="https://github.com/${repo}/tree/main">Latest documentation</a></li>
              </ul>
            `;
            return;
          }

          // Existing exact/latest chooser can stay simple.
          const latestTarget = githubTreeUrl("main");
          const exactTarget = githubTreeUrl(exactRef);
          const lastTarget = githubTreeUrl(docRef);

          document.body.innerHTML = `
            <h2>Documentation options</h2>
            <p>Please choose:</p>
            <ul>
              <li><strong><a href="${lastTarget}">Documentation for this version (recommended if tag exists)</a></strong></li>
              <li><a href="${exactTarget}">Documentation at version ${version}</a></li>
              <li><a href="${latestTarget}">Latest documentation</a></li>
            </ul>
          `;
        } catch (e) {
          console.error(e);
          document.body.innerHTML = `
            <h2>Documentation resolver not ready</h2>
            <p>
              The resolver could not determine the target from the explicit documentation tag
              or from npm metadata.
            </p>
            <p><a href="${githubTreeUrl("main")}">Latest documentation</a></p>
          `;
        }
      }

      resolve();
    </script>
  </body>
</html>
