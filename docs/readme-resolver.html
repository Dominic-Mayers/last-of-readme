<!doctype html>
<html>
<head><meta charset="utf-8"><title>Resolver</title></head>
<body>
<p>Resolving…</p>
<script src="./remote-repository-api.js"></script>
<script>
(async () => {
  const p = new URLSearchParams(location.search);
  const repository = p.get("repo");
  const version = p.get("v");

  if (!repository || !version) {
    document.body.innerText = "missing params";
    return;
  }

  const remoteRepository = createRemoteRepositoryAPI(repository);

  const base = `v${version}`;
  const last = `${base}-last-doc`;
  const next = `${base}-next-doc`;

  // 1. last-doc
  if (await remoteRepository.resolveTag(last)) {
    location.href = remoteRepository.browseDocumentation(last);
    return;
  }

  // 2. next-doc
  if (await remoteRepository.resolveTag(next)) {
    location.href = remoteRepository.browseDocumentation(next);
    return;
  }

  // resolve base
  const baseRepoNode = await remoteRepository.resolveTag(base);
  if (!baseRepoNode) {
    document.body.innerText = "version tag not found";
    return;
  }

  // 3-4. structural fallback
  const containingBranches = await remoteRepository.branchesContaining(baseRepoNode);

  if (containingBranches.length === 1) {
    location.href = remoteRepository.browseDocumentation(containingBranches[0]);
    return;
  }

  if (containingBranches.length > 1) {
    document.body.innerText = "multiple branches: " + containingBranches.join(", ");
    return;
  }

  // 5. no containing branch → base version
  location.href = remoteRepository.browseDocumentation(base);
})();
</script>
</body>
</html>
